{% extends 'base.html' %}


{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4">

                    <h2 class="text-center mb-4">
                        Регистрация
                    </h2>

                    <!-- Ошибка -->
                    {% if error %}
                        <div class="alert alert-danger">
                            {{ error }}
                        </div>
                    {% endif %}

                    <form method="post">

                        {% csrf_token %}

                        <!-- Username -->
                        <div class="mb-3">
                            <label class="form-label">
                                Имя пользователя
                            </label>

                            <input
                                type="text"
                                name="username"
                                class="form-control"
                                placeholder="Введите username"
                                required
                            >
                        </div>


                        <!-- Password -->
                        <div class="mb-3">
                            <label class="form-label">
                                Пароль
                            </label>

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                placeholder="Введите пароль"
                                required
                            >
                        </div>

                        <!-- Confirm Password -->
                        <div class="mb-4">
                            <label class="form-label">
                                Подтверждение пароля
                            </label>

                            <input
                                type="password"
                                name="password_confirm"
                                class="form-control"
                                placeholder="Повторите пароль"
                                required
                            >
                        </div>

                        <div class="d-grid">
                            <button
                                type="submit"
                                class="btn btn-primary rounded-3"
                            >
                                Зарегистрироваться
                            </button>
                        </div>

                    </form>

                    <div class="text-center mt-4">
                        <span class="text-muted">
                            Уже есть аккаунт?
                        </span>

                        <a
                            href="{% url 'login' %}"
                            class="text-decoration-none"
                        >
                            Войти
                        </a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
